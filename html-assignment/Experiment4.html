<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered and Nested List</title>
</head>
<body>

    <div class="list-container">
        <h1>Fresh Fruits Inventory</h1>
        
        <ul>
            <li>Mango</li>
            
            <li>Apple
                <ul>
                    <li>Fuji Apple</li>
                    <li>Green Apple (Granny Smith)</li>
                </ul>
            </li>
            
            <li>Banana</li>
            
            <li>Orange
                <ul>
                    <li>Nagpur Orange</li>
                    <li>Mandarin</li>
                </ul>
            </li>
            
            <li>Grapes</li>
        </ul>
    </div>

</body>
</html>
