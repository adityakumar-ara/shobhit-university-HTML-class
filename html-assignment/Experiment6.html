<!DOCTYPE html>
<html>

<head>
    <title>My Styled Page</title>

    <style>
        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        div {
            width: 300px;
            height: 50vh;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background-color: transparent;
            color: black;
            padding: 10px 20px;
            border: 3px solid rgb(215, 217, 81);
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(37, 78, 216);
            color: white;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome Students</h1>
        <p>This is a simple webpage designed using HTML and CSS.</p>
        <button>Click Me</button>
    </div>

</body>

</html>
